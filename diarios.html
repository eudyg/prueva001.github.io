<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAR_LOG | NEXUS OS</title>
    <style>
        :root { --bg: #050505; --panel: #0d0d0d; --accent: #00ff41; --danger: #ff3e3e; --warn: #ffcc00; --info: #00d4ff; --text: #d1d1d1; --subtle: #222; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        .nav-back { background: none; color: #555; border: 1px solid #333; padding: 8px 15px; cursor: pointer; margin-bottom: 20px; font-size: 0.7rem; border-radius: 4px; text-decoration: none; display: inline-block; }
        .nav-back:hover { border-color: var(--accent); color: var(--accent); }

        /* HEADER TAREAS */
        .progress-panel { background: var(--panel); border: 1px solid var(--subtle); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .bar-bg { background: #000; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #bar-fill { background: var(--accent); height: 100%; width: 0%; transition: 0.5s; box-shadow: 0 0 10px var(--accent); }

        /* FORMULARIO DE PRIORIDAD */
        .input-box { background: var(--panel); border: 1px solid var(--subtle); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        #tInput { background: #000; border: 1px solid #333; color: #fff; padding: 12px; width: 100%; box-sizing: border-box; margin-bottom: 10px; border-radius: 4px; font-family: inherit; }
        .priority-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .p-btn { border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 0.7rem; color: #000; text-transform: uppercase; }
        
        /* COLORES DE PRIORIDAD */
        .p-crit { background: var(--danger); }
        .p-norm { background: var(--warn); }
        .p-low { background: var(--info); }

        /* LISTA DE TARJETAS */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .task-card { background: var(--panel); border: 1px solid var(--subtle); padding: 15px; border-radius: 6px; display: flex; align-items: center; position: relative; cursor: pointer; transition: 0.2s; border-left: 5px solid #444; }
        .task-card:hover { border-color: #555; }
        
        /* ESTADOS DE TARJETA */
        .task-card.CRITICA { border-left-color: var(--danger); }
        .task-card.NORMAL { border-left-color: var(--warn); }
        .task-card.BAJA { border-left-color: var(--info); }
        .task-card.completed { opacity: 0.3; border-left-color: #111; background: #050505; text-decoration: line-through; }
        
        .task-card input { transform: scale(1.3); margin-right: 15px; accent-color: var(--accent); }
        .task-text { font-size: 0.9rem; flex-grow: 1; }
        .del-t { background: none; color: #444; border: none; font-size: 0.8rem; cursor: pointer; padding: 5px; }
        .del-t:hover { color: var(--danger); }
    </style>
</head>
<body>

    <a href="index.html" class="nav-back">← VOLVER AL MENÚ PRINCIPAL</a>

    <div id="task-view">
        <div class="progress-panel">
            <div style="display:flex; justify-content:space-between;">
                <span id="victory-label" style="font-size: 0.8rem; letter-spacing: 1px;">VICTORIAS: 0</span>
                <span id="percent-label" style="color:var(--accent); font-weight:bold;">0%</span>
            </div>
            <div class="bar-bg"><div id="bar-fill"></div></div>
        </div>

        <div class="input-box">
            <input type="text" id="tInput" placeholder="Escribe una nueva tarea...">
            <div class="priority-btns">
                <button class="p-btn p-crit" onclick="addTask('CRITICA')">CRÍTICA</button>
                <button class="p-btn p-norm" onclick="addTask('NORMAL')">NORMAL</button>
                <button class="p-btn p-low" onclick="addTask('BAJA')">BAJA</button>
            </div>
        </div>

        <div class="task-grid" id="tGrid"></div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('nx12_tasks')) || [
            {n: "Buscar 1,800 Internet", d: false, p: "CRITICA"},
            {n: "Entrevista Call Center", d: false, p: "CRITICA"},
            {n: "Taxiar / Gasolina", d: false, p: "NORMAL"},
            {n: "Biblia al día", d: false, p: "BAJA"}
        ];

        function render() {
            const tGrid = document.getElementById('tGrid');
            tGrid.innerHTML = '';
            let completed = 0;

            const pOrder = { "CRITICA": 1, "NORMAL": 2, "BAJA": 3 };
            tasks.sort((a,b) => pOrder[a.p] - pOrder[b.p]);

            tasks.forEach((t, i) => {
                if(t.d) completed++;
                tGrid.innerHTML += `
                    <div class="task-card ${t.p} ${t.d ? 'completed' : ''}" onclick="toggleT(${i})">
                        <input type="checkbox" ${t.d ? 'checked' : ''} onchange="event.stopPropagation(); toggleT(${i})">
                        <div class="task-text">
                            <div style="font-size:0.6rem; opacity:0.6; text-transform: uppercase;">${t.p}</div>
                            ${t.n}
                        </div>
                        <button class="del-t" onclick="event.stopPropagation(); delT(${i})">×</button>
                    </div>`;
            });

            const progress = tasks.length ? Math.round((completed / tasks.length) * 100) : 0;
            document.getElementById('bar-fill').style.width = progress + '%';
            document.getElementById('percent-label').innerText = progress + '%';
            document.getElementById('victory-label').innerText = `VICTORIAS: ${completed} / ${tasks.length}`;
            localStorage.setItem('nx12_tasks', JSON.stringify(tasks));
        }

        function addTask(priority) {
            const val = document.getElementById('tInput').value;
            if(val) {
                tasks.push({n: val, d: false, p: priority});
                document.getElementById('tInput').value = '';
                render();
            }
        }

        function toggleT(i) { tasks[i].d = !tasks[i].d; render(); }
        function delT(i) { if(confirm("¿Eliminar esta tarea?")) { tasks.splice(i, 1); render(); } }

        render();
    </script>
</body>
</html>
