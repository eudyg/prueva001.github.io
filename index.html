<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS OS | EUDY GARCIA</title>
    <style>
        :root { 
            --bg: #050505; 
            --accent: #00ff41; 
            --danger: #ff3e3e; 
            --panel: #0a0a0a;
            --text: #d1d1d1; 
        }

        body { 
            font-family: 'Consolas', 'Courier New', monospace; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
            border: 2px solid #111;
            box-sizing: border-box;
        }

        /* EFECTO SCANLINE TIPO MONITOR VIEJO */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 118, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .header { text-align: center; margin-bottom: 40px; z-index: 3; }
        .header h1 { 
            letter-spacing: 10px; 
            color: var(--accent); 
            font-size: 2rem; 
            margin: 0; 
            text-shadow: 0 0 10px var(--accent);
        }
        .header p { 
            font-size: 0.7rem; 
            color: #444; 
            letter-spacing: 3px; 
            margin-top: 10px;
            text-transform: uppercase;
        }

        .nav-container { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 340px; 
            z-index: 3;
        }

        .nav-card {
            background: var(--panel);
            border: 1px solid #222;
            padding: 20px;
            text-decoration: none;
            color: var(--accent);
            text-align: left;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-card:hover {
            background: #111;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            transform: translateX(10px);
        }

        .nav-card.danger {
            color: var(--danger);
        }

        .nav-card.danger:hover {
            border-color: var(--danger);
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.2);
        }

        .status-bar {
            margin-top: 40px;
            font-size: 0.6rem;
            color: #333;
            text-align: center;
            z-index: 3;
        }

        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        span.code { color: #555; font-size: 0.7rem; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PROTOCOLO NEXUS</h1>
        <p>COMMAND & CONTROL // EUDY GARCIA</p>
    </div>

    <div class="nav-container">
        <a href="diarios.html" class="nav-card">
            <span><span class="code">[01]</span> Objetivos diarios</span>
            <span style="font-size: 1.2rem;">→</span>
        </a>

        <a href="deudas.html" class="nav-card danger">
            <span><span class="code">[02]</span> Control de deudas</span>
            <span class="blink" style="font-size: 1.2rem;">!</span>
        </a>
    </div>

    <div class="status-bar">
        CONNECTED_AS: ENGINEER_GARCIA <br>
        LOCATION: SANTO_DOMINGO_DR <br>
        <span class="blink">SYSTEM_READY_</span>
    </div>

</body>
</html>
